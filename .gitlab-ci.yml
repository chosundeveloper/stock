stages:
  - build
  - push
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: "stock"
  SERVICE_NAME: "stock"
  DOMAIN: "stock.chosundev.cloud"
  REGISTRY: "172.30.1.46:8929"
  REGISTRY_URL: "$REGISTRY/$CI_PROJECT_NAMESPACE/$IMAGE_NAME"

build:docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache bash
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY
  script:
    - docker build -t $REGISTRY_URL:$CI_COMMIT_SHORT_SHA -t $REGISTRY_URL:latest .
  after_script:
    - docker logout $REGISTRY || true
  only:
    - main
    - master

push:registry:
  stage: push
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache bash
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY
  script:
    - docker push $REGISTRY_URL:$CI_COMMIT_SHORT_SHA
    - docker push $REGISTRY_URL:latest
  after_script:
    - docker logout $REGISTRY || true
  only:
    - main
    - master

deploy:production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://$DOMAIN
  before_script:
    - apk add --no-cache openssh-client bash
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $DEPLOY_SERVER >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - |
      ssh -i ~/.ssh/id_rsa $DEPLOY_USER@$DEPLOY_SERVER "
        cd ~/services && \
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $REGISTRY && \
        docker pull $REGISTRY_URL:latest && \
        docker-compose up -d $SERVICE_NAME && \
        docker-compose ps $SERVICE_NAME
      "
  after_script:
    - rm -f ~/.ssh/id_rsa
  when: manual
  only:
    - main
    - master

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: stock-postgres
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stock_db
      DB_USER: stock_user
      DB_PASSWORD: stock_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:3000
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stock-api.rule=Host(`api.stock.chosundev.cloud`)"
      - "traefik.http.routers.stock-api.entrypoints=websecure"
      - "traefik.http.routers.stock-api.tls=true"
      - "traefik.http.routers.stock-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.stock-api.loadbalancer.server.port=3001"
    networks:
      - traefik-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stock-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stock.rule=Host(`stock.chosundev.cloud`)"
      - "traefik.http.routers.stock.entrypoints=websecure"
      - "traefik.http.routers.stock.tls=true"
      - "traefik.http.routers.stock.tls.certresolver=letsencrypt"
      - "traefik.http.services.stock.loadbalancer.server.port=3000"
    networks:
      - traefik-network

volumes:
  redis-data:
  postgres-data:

networks:
  traefik-network:
    external: true
